name: multi-event CI/CD

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

jobs:
  multi-eventJob:
    runs-on: ubuntu-latest
    steps:
      - name: "Echo Github Ref"
        run: echo "REF: $GITHUB_REF"
      - name: "Echo Github Job Id"
        run: echo "JOB ID: $GITHUB_JOB"
      - name: "Echo Github Action"
        run: echo "Action: $GITHUB_ACTION"
      - name: "Echo Gihub actor"
        run: echo "Actor: $GITHUB_ACTOR"