name: multi-event CI/CD

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

jobs:
  multi-eventJob:
    runs-on: ubuntu-latest
    steps:
      - name: "Echo Basic Information"
        run:
          echo "REF: $GITHUB_REF"
          echo "JOB ID: $GITHUB_JOB"
          echo "Action: $GITHUB_ACTION"
          echo "Actor: $GITHUB_ACTOR"